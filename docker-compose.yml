# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — base de données PostgreSQL pour le DÉV LOCAL uniquement.
#
#  Ce fichier NE lance PAS l'application (backend NestJS + frontend Vite).
#  Il fournit juste un Postgres jetable pour ne pas avoir à installer
#  PostgreSQL sur la machine de dev.
#
#  Usage :
#    docker compose up -d         # démarrer Postgres
#    docker compose down          # arrêter (volume conservé)
#    docker compose down -v       # arrêter + tout effacer
#
#  Pour lancer l'app : voir start.sh (macOS dev) ou server-start.sh (Debian prod).
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pj
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
